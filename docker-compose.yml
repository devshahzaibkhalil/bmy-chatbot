version: "3.8"

services:
  bmy-chatbot:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Set these to fixed values for anything beyond local testing - see
      # DEPLOYMENT.md. Left unset here, so keys auto-generate into the
      # ./database/.keys volume on first run (fine for a single instance).
      - SECRET_KEY=
      - BMY_ENCRYPTION_KEY=
      - BMY_BLIND_INDEX_KEY=
      - BMY_RATE_LIMIT_PER_MINUTE=30
      # - BMY_REDIS_URL=redis://redis:6379/0   # uncomment if using the redis service below
    volumes:
      - ./database:/app/database
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    restart: unless-stopped

  # Optional - only needed for multi-process rate limiting (BMY_REDIS_URL above).
  # A single bmy-chatbot instance doesn't need this.
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
